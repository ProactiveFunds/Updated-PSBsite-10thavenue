# Render Blueprint — static site for the Astro build.
# In Render: New + → "Blueprint" → connect this repo, and it reads this file.
# (Or configure the same values manually as a "Static Site".)
services:
  - type: web
    name: sustainablebonds
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    # Cache-Control headers so repeat visitors and crawlers stop re-downloading
    # assets on every request (a major driver of outbound bandwidth).
    headers:
      # Content-hashed build assets — safe to cache forever.
      - path: /_astro/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      # Fonts use stable unique filenames — effectively immutable.
      - path: /fonts/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      # Videos: stable names, rarely change — cache 30 days.
      - path: /videos/*
        name: Cache-Control
        value: public, max-age=2592000
      # Images: cache 30 days.
      - path: /img/*
        name: Cache-Control
        value: public, max-age=2592000
      # Verification PDFs (heavy) — cache 30 days.
      - path: /verified/*
        name: Cache-Control
        value: public, max-age=2592000
    envVars:
      - key: NODE_VERSION
        value: "22"
